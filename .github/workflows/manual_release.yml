name: "Build luci-theme-argondash (multi-version)"

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "luci-theme-argondash/Makefile"

env:
  TZ: Europe/Moscow
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ────────────────────────────────────────────────────────
  # 1. Проверка: нужна ли сборка (новая версия в Makefile?)
  # ────────────────────────────────────────────────────────
  job_check:
    name: Check Version
    runs-on: ubuntu-latest
    if: github.repository == 'evoll/luci-theme-argondash'
    permissions:
      contents: write
    outputs:
      argon_version: ${{ steps.check_version.outputs.latest_version }}
      has_update:    ${{ steps.check_version.outputs.has_update }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Check version
        id: check_version
        env:
          url_release: https://api.github.com/repos/${{ github.repository }}/releases/latest
        run: |
          latest_version=$(grep -oP 'PKG_VERSION:=\K.*' luci-theme-argondash/Makefile | sed 's/^/v/')
          latest_release=$(wget -qO- -t1 -T2 ${{ env.url_release }} | awk -F'"' '/tag_name/{print $4}')
          has_update=$([ "${latest_version}" != "${latest_release}" ] && echo true || echo false)
          echo "latest_version=${latest_version}" >> $GITHUB_OUTPUT
          echo "has_update=${has_update}"         >> $GITHUB_OUTPUT
          echo "=== Version check ==="
          echo "  In Makefile : ${latest_version}"
          echo "  Last release: ${latest_release}"
          echo "  Needs build : ${has_update}"

      - name: Create release tag
        if: steps.check_version.outputs.has_update == 'true'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.check_version.outputs.latest_version }}
          name: luci-theme-argondash ${{ steps.check_version.outputs.latest_version }}
          body: |
            Автоматическая сборка для нескольких версий OpenWrt.
            Выберите нужный файл пакета:

            | Файл | Ветка OpenWrt | Менеджер пакетов |
            |------|--------------|-----------------|
            | `*23.05*` | OpenWrt 23.05.x (latest) | opkg / `.ipk` |
            | `*24.10*` | OpenWrt 24.10.x (latest) | opkg / `.ipk` |
            | `*25.12*` | OpenWrt 25.12.x (latest) | apk / `.apk` |
            | `*snapshot*` | OpenWrt snapshot | apk / `.apk` |

  # ────────────────────────────────────────────────────────
  # 2. Matrix-сборка под 4 версии OpenWrt
  # ────────────────────────────────────────────────────────
  job_build:
    name: Build for OpenWrt ${{ matrix.openwrt_version }}
    needs: job_check
    if: needs.job_check.outputs.has_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:

          # ── 23.05.x ── стабильная, opkg/ipk ──────────
          - openwrt_version: "23.05"
            branch_prefix: "23.05"
            is_snapshot: "false"
            pkg_ext: "ipk"
            feeds_base:     "https://github.com/openwrt/openwrt.git;openwrt-23.05"
            feeds_packages: "https://github.com/openwrt/packages.git;openwrt-23.05"
            feeds_luci:     "https://github.com/openwrt/luci.git;openwrt-23.05"

          # ── 24.10.x ── стабильная, opkg/ipk ──────────
          - openwrt_version: "24.10"
            branch_prefix: "24.10"
            is_snapshot: "false"
            pkg_ext: "ipk"
            feeds_base:     "https://github.com/openwrt/openwrt.git;openwrt-24.10"
            feeds_packages: "https://github.com/openwrt/packages.git;openwrt-24.10"
            feeds_luci:     "https://github.com/openwrt/luci.git;openwrt-24.10"

          # ── 25.12.x ── стабильная, apk ────────────────
          - openwrt_version: "25.12"
            branch_prefix: "25.12"
            is_snapshot: "false"
            pkg_ext: "apk"
            feeds_base:     "https://github.com/openwrt/openwrt.git;openwrt-25.12"
            feeds_packages: "https://github.com/openwrt/packages.git;openwrt-25.12"
            feeds_luci:     "https://github.com/openwrt/luci.git;openwrt-25.12"

          # ── snapshot ── нестабильная, apk, без кэша ───
          - openwrt_version: "snapshot"
            branch_prefix: ""
            is_snapshot: "true"
            pkg_ext: "apk"
            feeds_base:     "https://github.com/openwrt/openwrt.git;main"
            feeds_packages: "https://github.com/openwrt/packages.git;master"
            feeds_luci:     "https://github.com/openwrt/luci.git;master"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install build dependencies
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install \
            zstd build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-venv \
            rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      # Динамически находим последний патч-релиз и точное имя файла SDK.
      # Для snapshot просто сканируем директорию — имя файла там тоже меняется
      # при обновлении тулчейна, поэтому хардкодить gcc-версию небезопасно.
      - name: Resolve SDK URL
        id: resolve-sdk
        run: |
          INDEX_BASE="https://downloads.openwrt.org"

          if [ "${{ matrix.is_snapshot }}" = "true" ]; then
            INDEX_URL="${INDEX_BASE}/snapshots/targets/x86/64/"
            CACHE_KEY=""
          else
            # Ищем последний патч-релиз ветки (например, 23.05.6, 23.05.7...)
            LATEST=$(wget -qO- "${INDEX_BASE}/releases/" \
              | grep -oP 'href="\K${{ matrix.branch_prefix }}\.[0-9]+(?=/")' \
              | sort -V | tail -1)

            if [ -z "${LATEST}" ]; then
              echo "ERROR: не удалось найти релиз для ветки ${{ matrix.branch_prefix }}"
              exit 1
            fi

            echo "Найден последний релиз: ${LATEST}"
            INDEX_URL="${INDEX_BASE}/releases/${LATEST}/targets/x86/64/"
            CACHE_KEY="sdk-${LATEST}-x86-64"
          fi

          # Находим точное имя файла SDK в индексе директории
          SDK_FILE=$(wget -qO- "${INDEX_URL}" \
            | grep -oP 'openwrt-sdk[^"<> ]+\.tar\.(zst|xz)' \
            | sort -u | head -1)

          if [ -z "${SDK_FILE}" ]; then
            echo "ERROR: файл SDK не найден в ${INDEX_URL}"
            exit 1
          fi

          SDK_URL="${INDEX_URL}${SDK_FILE}"
          [[ "${SDK_FILE}" == *.tar.xz ]] && SDK_FORMAT="xz" || SDK_FORMAT="zst"

          echo "SDK_URL=${SDK_URL}"       >> $GITHUB_ENV
          echo "SDK_FORMAT=${SDK_FORMAT}" >> $GITHUB_ENV
          echo "CACHE_KEY=${CACHE_KEY}"   >> $GITHUB_ENV
          echo "  File  : ${SDK_FILE}"
          echo "  URL   : ${SDK_URL}"
          echo "  Cache : ${CACHE_KEY:-<no cache>}"

      # Кэш только для стабильных версий (CACHE_KEY непустой)
      - name: Cache OpenWrt SDK (${{ matrix.openwrt_version }})
        id: cache-sdk
        if: env.CACHE_KEY != ''
        uses: actions/cache@v4
        with:
          path: sdk
          key: ${{ env.CACHE_KEY }}

      - name: Download and unpack SDK
        if: env.CACHE_KEY == '' || steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget -q "${SDK_URL}"
          archive=$(basename "${SDK_URL}")
          mkdir -p sdk
          if [ "${SDK_FORMAT}" = "zst" ]; then
            tar --zstd -xf "${archive}" -C ./sdk --strip-components=1
          else
            tar -xf "${archive}" -C ./sdk --strip-components=1
          fi

      - name: Setup feeds and download sources
        if: env.CACHE_KEY == '' || steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          cd sdk
          # Без отступов — иначе пробелы попадут в feeds.conf и feeds update упадёт
          cat > feeds.conf << EOF
src-git base     ${{ matrix.feeds_base }}
src-git packages ${{ matrix.feeds_packages }}
src-git luci     ${{ matrix.feeds_luci }}
EOF

          git clone -b main \
            https://github.com/${{ github.repository }}.git \
            package/downloads/luci-theme-argondash

          ./scripts/feeds update -a
          echo "CONFIG_PACKAGE_luci-theme-argondash=m" > .config
          ./scripts/feeds install -d n luci-theme-argondash
          make download -j8

      - name: Configure build
        run: |
          cd sdk
          ./scripts/feeds install luci-theme-argondash
          cat > .config << 'EOF'
CONFIG_ALL_NONSHARED=n
CONFIG_ALL_KMODS=n
CONFIG_ALL=n
CONFIG_AUTOREMOVE=n
CONFIG_LUCI_LANG_ru=y
CONFIG_PACKAGE_luci-theme-argondash=m
EOF
          make defconfig

      - name: Compile luci-theme-argondash
        id: compile
        run: |
          cd sdk
          # Разделяем clean и compile — brace expansion надёжнее как две цели
          make package/luci-theme-argondash/clean   -j$(nproc) V=s
          make package/luci-theme-argondash/compile -j$(nproc) V=s BUILD_LOG=1

          mkdir -p ../output
          for pkg in bin/packages/x86_64/base/luci-theme*.${{ matrix.pkg_ext }}; do
            [ -f "${pkg}" ] || continue
            base=$(basename "${pkg}" .${{ matrix.pkg_ext }})
            cp "${pkg}" "../output/${base}-openwrt${{ matrix.openwrt_version }}.${{ matrix.pkg_ext }}"
          done

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload packages to release
        if: steps.compile.outputs.status == 'success'
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.job_check.outputs.argon_version }}
          files: output/*.${{ matrix.pkg_ext }}
